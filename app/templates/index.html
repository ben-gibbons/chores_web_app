<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Office Chores</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Office Chores</h1>
    </header>

    <main class="layout">
      <section class="calendar-pane">
        <div id="calendar"></div>
      </section>

      <aside class="side-pane">
        <section class="panel" id="chores-panel">
          <div class="panel-header">
            <h2>Chores</h2>
            <button type="button" class="btn primary" data-action="add-chore">+ Add chore</button>
          </div>
          <ul class="list" id="chores-list"></ul>
        </section>

        <section class="panel" id="members-panel">
          <div class="panel-header">
            <h2>Team members</h2>
            <button type="button" class="btn primary" data-action="add-member">+ Add member</button>
          </div>
          <ul class="list" id="members-list"></ul>
        </section>
      </aside>
    </main>

    <div id="modal-root" class="modal-root hidden" aria-hidden="true"></div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
